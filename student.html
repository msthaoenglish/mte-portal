<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Student Dashboard | Ms Thao English</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <style>
    body{
      font-family:'Plus Jakarta Sans',sans-serif;
      background:
      linear-gradient(
        180deg,
        #F0FDF4 0%,
        #E8F5E9 100%
      );
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="bg-white border-b border-green-100 shadow-sm sticky top-0 z-50">

    <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">

      <div class="flex items-center space-x-3">

        <div class="w-10 h-10 rounded-full bg-green-700 text-white flex items-center justify-center shadow-sm">
          <i class="fas fa-graduation-cap"></i>
        </div>

        <div class="flex flex-col">

          <span class="font-black text-green-800 uppercase text-sm tracking-tight">
            MS THAO ENGLISH CENTER
          </span>

          <span class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">
            Student Portal
          </span>

        </div>

      </div>

      <button
        onclick="logout()"
        class="px-4 py-2 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs font-bold hover:bg-red-100 transition-all"
      >
        <i class="fas fa-sign-out-alt mr-1"></i>
        Đăng xuất
      </button>

    </div>

  </header>

  <!-- MAIN -->
  <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-8">

    <!-- USER INFO -->
    <div class="bg-white rounded-3xl shadow-sm border border-green-100 p-6 mb-6">

      <div class="flex items-center justify-between">

        <div>

          <p class="text-xs uppercase tracking-wider text-gray-400 font-bold mb-1">
            Học sinh đăng nhập
          </p>

          <h1
            id="student-name"
            class="text-2xl font-black text-slate-800"
          >
            Đang tải...
          </h1>

          <div
            id="class-name"
            class="inline-flex mt-2 px-3 py-1 rounded-full bg-green-50 text-green-700 text-xs font-extrabold"
          >
            Đang tải...
          </div>

        </div>

        <div class="hidden sm:block text-right">

          <p class="text-xs uppercase tracking-wider text-gray-400 font-bold">
            Hôm nay
          </p>

          <p
            id="today-date"
            class="text-sm font-black text-slate-700 mt-1"
          ></p>

        </div>

      </div>

    </div>

    <!-- TITLE -->
    <div class="flex items-center space-x-2 mb-4">

      <i class="fas fa-file-signature text-green-700"></i>

      <h2 class="font-black text-green-900 uppercase text-sm tracking-wide">
        Danh sách bài kiểm tra
      </h2>

    </div>

    <!-- EXAM LIST -->
    <div
      id="exam-container"
      class="grid grid-cols-1 md:grid-cols-2 gap-4"
    >

      <!-- loading -->
      <div class="col-span-full bg-white rounded-2xl p-8 text-center shadow-sm border border-slate-100">

        <i class="fas fa-circle-notch animate-spin text-green-700 text-2xl mb-3"></i>

        <p class="text-sm font-bold text-gray-400">
          Đang tải danh sách đề thi...
        </p>

      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="text-center text-xs text-gray-400 font-bold py-6">
    © 2026 Ms Thao English Center
  </footer>

<script>

  // ==========================================
  // CONFIG
  // ==========================================

  const SCRIPT_URL =
  "https://script.google.com/macros/s/AKfycbyzYcftoVEumIS0lGPmg1Enw7QOPU0puDib-b1eocj5j-DsYD5mHcKzIqiZXnrNc4oN7A/exec";


  // ==========================================
  // URL PARAMS
  // ==========================================

  const urlParams =
    new URLSearchParams(window.location.search);

  const classId =
    urlParams.get("classId") || "";

  const studentId =
    urlParams.get("studentId") || "";

  const studentName =
    urlParams.get("studentName") || "Học sinh";

  const className =
    urlParams.get("className") || "Lớp học";


  // ==========================================
  // INIT
  // ==========================================

  window.addEventListener("DOMContentLoaded", () => {

    document.getElementById("today-date").innerText =
      new Date().toLocaleDateString("vi-VN");

    document.getElementById("student-name").innerText =
      studentName + " 👋";

    document.getElementById("class-name").innerText =
      "Lớp: " + className;

    if (!classId) {

      showError("Không tìm thấy classId!");

      return;
    }

    loadExams();

  });


  // ==========================================
  // LOAD EXAMS
  // ==========================================

  async function loadExams() {

    const container =
      document.getElementById("exam-container");

    try {

      const response = await fetch(
        `${SCRIPT_URL}?action=getExams&classId=${encodeURIComponent(classId)}`
      );

      const exams =
        await response.json();

      container.innerHTML = "";

      if (!Array.isArray(exams) || exams.length === 0) {

        container.innerHTML = `
        
          <div class="col-span-full bg-white rounded-2xl p-8 text-center border border-dashed border-gray-200">
            
            <i class="far fa-folder-open text-4xl text-gray-300 mb-3"></i>

            <p class="text-sm font-bold text-gray-400">
              Hiện chưa có bài kiểm tra nào.
            </p>

          </div>

        `;

        return;
      }

      exams.forEach(exam => {

        const card =
          document.createElement("div");

        card.className =
        "bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex flex-col justify-between hover:shadow-md transition-all";

        card.innerHTML = `
        
          <div>

            <h3 class="font-black text-slate-800 text-base leading-snug mb-3">
              ${exam.title}
            </h3>

            <div class="flex items-center space-x-4 text-xs text-gray-400 font-bold">

              <span>
                <i class="far fa-clock text-green-600 mr-1"></i>
                ${exam.duration} phút
              </span>

              <span>
                <i class="fas fa-ticket-alt text-green-600 mr-1"></i>
                ${exam.examId}
              </span>

            </div>

          </div>

          <button
            onclick="startExam()"
            class="mt-5 w-full py-3 rounded-xl bg-green-700 hover:bg-green-800 text-white text-xs font-black uppercase tracking-wider transition-all"
          >
            <i class="fas fa-play mr-1"></i>
            Bắt đầu làm bài
          </button>

        `;

        container.appendChild(card);

      });

    } catch(error) {

      console.error(error);

      showError("Lỗi tải danh sách đề thi!");
    }
  }


  // ==========================================
  // START EXAM
  // ==========================================

  function startExam() {

    const ok =
      confirm("Con đã sẵn sàng làm bài chưa?");

    if (!ok) return;

    const examUrl =
      `${SCRIPT_URL}` +
      `?action=viewExam` +
      `&studentId=${encodeURIComponent(studentId)}` +
      `&studentName=${encodeURIComponent(studentName)}` +
      `&classId=${encodeURIComponent(classId)}` +
      `&className=${encodeURIComponent(className)}`;

    console.log(examUrl);

    window.open(examUrl, "_blank");
  }


  // ==========================================
  // ERROR UI
  // ==========================================

  function showError(message) {

    document.getElementById("exam-container").innerHTML = `
    
      <div class="col-span-full bg-red-50 border border-red-100 rounded-2xl p-8 text-center">

        <i class="fas fa-circle-exclamation text-red-500 text-3xl mb-3"></i>

        <p class="text-sm font-bold text-red-600">
          ${message}
        </p>

      </div>

    `;
  }


  // ==========================================
  // LOGOUT
  // ==========================================

  function logout() {

    window.location.href = "index.html";
  }

</script>

</body>
</html>
