<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Điều Khiển Học Sinh | Ms Thao English Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: linear-gradient(180deg, #F0FDF4 0%, #E8F5E9 100%); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between pb-12">

    <header class="bg-white shadow-sm border-b border-green-100 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-green-700 rounded-full flex items-center justify-center text-white shadow-sm">
                    <i class="fas fa-graduation-cap text-lg"></i>
                </div>
                <div class="flex flex-col">
                    <span class="font-black text-green-800 text-base leading-tight uppercase tracking-tight">MS THAO ENGLISH CENTER</span>
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Học sinh Online Portal</span>
                </div>
            </div>
            <button onclick="location.href='index.html'" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-2 text-xs font-bold rounded-xl transition-all">
                <i class="fas fa-sign-out-alt mr-1"></i> Đăng xuất
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-4xl w-full mx-auto px-4 py-8">
        <div class="space-y-6">
            <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-green-700 flex justify-between items-center">
                <div>
                    <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Thí sinh đang đăng nhập:</span>
                    <h2 id="user-display-name" class="text-xl font-black text-slate-900 mt-0.5">Đang tải...</h2>
                    <p id="user-display-class" class="text-xs text-green-700 font-extrabold bg-green-50 px-2 py-0.5 rounded-md inline-block mt-1">Lớp: Đang tải...</p>
                </div>
                <div class="text-right text-xs text-gray-400 font-bold hidden sm:block">
                    <p><i class="far fa-calendar-alt mr-1"></i> Hôm nay</p>
                    <p class="text-slate-700 font-extrabold mt-0.5" id="live-date">--/--/----</p>
                </div>
            </div>

            <div class="flex items-center space-x-2 text-green-900 font-extrabold text-base">
                <i class="fas fa-file-signature"></i>
                <h3>DANH SÁCH BÀI KIỂM TRA ĐANG MỞ VÀO LÚC NÀY:</h3>
            </div>

            <div id="exams-list-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </main>

    <footer class="text-center text-xs text-gray-400 font-bold px-4">
        <p>© 2026 Ms Thao English Center. All Rights Reserved.</p>
    </footer>

    <script>
        // 🌟 MÁ ĐIỀN ĐƯỜNG LINK WEB APP SCRIPT ĐUÔI /exec CỦA MÁ VÀO ĐÂY:
        const SCRIPT_URL = 'THAY_LINK_WEB_APP_APPS_SCRIPT_CỦA_BẠN_VÀO_ĐÂY';

        // Khai báo các biến hứng dữ liệu từ đường link URL bốc về
        let loggedClassId = "";
        let loggedStudentId = "";
        let loggedStudentName = "";
        let loggedClassName = "";

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('live-date').innerText = new Date().toLocaleDateString('vi-VN');

            // 🌟 THUẬT TOÁN BÓC TÁCH URL: Tự động thò tay lên link web bốc dữ liệu về
            const urlParams = new URLSearchParams(window.location.search);
            loggedClassId = urlParams.get('classId') || "";
            loggedStudentId = urlParams.get('studentId') || "GUEST";
            // Đọc từ khóa 'studentName', nếu không có tự động đọc từ khóa 'name' phòng hờ link cũ
            loggedStudentName = urlParams.get('studentName') || urlParams.get('name') || "Học sinh";
            loggedClassName = urlParams.get('className') || "Lớp Học";

            // Đổ thông tin bốc được lên giao diện banner chào mừng
            document.getElementById('user-display-name').innerText = `${loggedStudentName} 👋`;
            document.getElementById('user-display-class').innerText = `Lớp: ${loggedClassName}`;

            if (loggedClassId) {
                // Tiến hành đi gọi server lấy đề thi về
                loadAvailableExams();
            } else {
                document.getElementById('exams-list-container').innerHTML = '<div class="col-span-full text-center text-sm font-bold text-red-500 py-6">Lỗi dữ liệu: Không tìm thấy Mã Lớp! Con vui lòng quay lại trang đăng nhập.</div>';
            }
        });

        // Hàm thò tay vào tab Exams bốc đề thi về hiển thị
        function loadAvailableExams() {
            const container = document.getElementById('exams-list-container');
            container.innerHTML = '<div class="col-span-full text-center text-sm font-bold text-gray-400 py-6"><i class="fas fa-circle-notch animate-spin mr-2"></i> Đang tải đề thi của lớp con...</div>';

            fetch(`${SCRIPT_URL}?action=getExams&classId=${loggedClassId}`)
                .then(res => res.json())
                .then(exams => {
                    container.innerHTML = "";
                    
                    if (exams.length === 0) {
                        container.innerHTML = '<div class="col-span-full bg-white rounded-2xl p-8 border border-dashed border-gray-200 text-center text-sm text-gray-400 font-bold"><i class="far fa-folder-open text-3xl block mb-2 text-gray-300"></i> Hiện tại lớp mình chưa có bài kiểm tra nào được mở con nhé!</div>';
                        return;
                    }

                    // Render danh sách đề thi Canvas lộng lẫy
                    exams.forEach(exam => {
                        const card = document.createElement('div');
                        card.className = "bg-white rounded-2xl p-5 shadow-sm border border-slate-100 flex flex-col justify-between hover:shadow-md transition-all group";
                        card.innerHTML = `
                            <div>
                                <h4 class="font-extrabold text-slate-800 text-base group-hover:text-green-800 transition-colors leading-snug mb-3">${exam.title}</h4>
                                <div class="flex items-center space-x-4 text-xs font-bold text-gray-400">
                                    <span><i class="far fa-clock text-green-600 mr-1.5"></i>Thời gian: ${exam.duration} phút</span>
                                    <span><i class="fas fa-ticket-alt text-green-600 mr-1.5"></i>Mã đề: ${exam.examId}</span>
                                </div>
                            </div>
                            <button onclick="startExamRedirect('${exam.fileId}')" class="mt-5 w-full py-3 bg-green-700 hover:bg-green-800 text-white text-xs font-black uppercase tracking-wider rounded-xl shadow-sm transition-all flex items-center justify-center space-x-1.5 transform active:scale-[0.98]">
                                <i class="fas fa-play text-[10px]"></i>
                                <span>Bắt đầu làm bài</span>
                            </button>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(() => {
                    container.innerHTML = '<div class="col-span-full text-center text-sm font-bold text-red-500 py-6">Lỗi tải đề! Con vui lòng tải lại trang hoặc đăng xuất đăng nhập lại.</div>';
                });
        }

        // Kích hoạt mở phòng thi Canvas tiêm ngầm danh tính
        function startExamRedirect(fileIdDrive) {
            if (confirm("Con đã chuẩn bị giấy nháp và sẵn sàng bấm giờ làm bài chưa?")) {
                const finalExamUrl = `${SCRIPT_URL}` +
                    `?action=viewExam` +
                    `&fileId=${fileIdDrive}` +
                    `&studentId=${loggedStudentId}` +
                    `&studentName=${encodeURIComponent(loggedStudentName)}` +
                    `&classId=${loggedClassId}` +
                    `&className=${encodeURIComponent(loggedClassName)}`;
                
                window.location.href = finalExamUrl;
            }
        }
    </script>
</body>
</html>
