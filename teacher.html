<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển Giáo viên | Ms Thao English</title>
    <link rel="preconnect" href="[https://fonts.googleapis.com](https://fonts.googleapis.com)">
    <link rel="preconnect" href="[https://fonts.gstatic.com](https://fonts.gstatic.com)" crossorigin>
    <link href="[https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap](https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap)" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: linear-gradient(180deg, #FFFFFF 0%, #E8F5E9 100%); min-height: 100vh; padding: 30px 20px; color: #333333; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        .header-bar { background-color: #FFFFFF; border-radius: 16px; padding: 20px 25px; box-shadow: 0 10px 30px rgba(27, 94, 32, 0.03); display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-left: 5px solid #2E7D32; }
        .header-bar h2 { font-size: 18px; color: #1b5e20; font-weight: 800; }
        .logout-btn { background-color: #F5F5F5; color: #666666; border: 1px solid #E0E0E0; padding: 8px 15px; font-size: 12px; font-weight: 700; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .form-card { background-color: #FFFFFF; border-radius: 20px; padding: 35px 30px; box-shadow: 0 10px 30px rgba(27, 94, 32, 0.05); }
        .form-title { font-size: 20px; font-weight: 800; color: #1b5e20; margin-bottom: 20px; text-align: center; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .label { display: block; font-size: 11px; font-weight: 800; color: #2E7D32; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
        .input-field, .select-field { width: 100%; padding: 13px 15px; font-size: 14px; font-weight: 500; border: 1.5px solid #2E7D32; border-radius: 12px; color: #333333; background-color: #FFFFFF; outline: none; transition: all 0.3s; }
        .select-field { appearance: none; -webkit-appearance: none; -moz-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)' viewBox='0 0 24 24' fill='none' stroke='%232E7D32' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; cursor: pointer; }
        .input-field:focus, .select-field:focus { border-color: #4CAF50; box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15); }
        .submit-btn { width: 100%; padding: 15px; font-size: 15px; font-weight: 700; color: #FFFFFF; background-color: #2E7D32; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2); margin-top: 10px; }
        .submit-btn:hover { background-color: #1b5e20; }
        .submit-btn:disabled { background-color: #A5D6A7; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h2>Giao diện Giáo viên: Ms Thao 👩‍🏫</h2>
            <button class="logout-btn" onclick="location.href='index.html'">Đăng xuất</button>
        </div>
        <div class="form-card">
            <h3 class="form-title">Hệ Thống Tạo Đề Thi Với Gemini AI</h3>
            <form id="form-create-exam" onsubmit="handleCreateExam(event)">
                <div class="form-group">
                    <label class="label">Tên bài kiểm tra / Tên đề thi</label>
                    <input type="text" id="exam-title" placeholder="Ví dụ: Đề kiểm tra từ vựng Tuần 1" required class="input-field">
                </div>
                <div class="form-group">
                    <label class="label">Giao cho lớp học nào</label>
                    <select id="exam-class" class="select-field" required>
                        <option value="" disabled selected>Đang tải danh sách lớp từ hệ thống...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="label">Thời gian làm bài (Số phút)</label>
                    <input type="number" id="exam-duration" placeholder="Ví dụ: 15, 45, 60" min="1" required class="input-field">
                </div>
                <div class="form-group">
                    <label class="label">Tải file tài liệu chứa câu hỏi (PDF / DOCX)</label>
                    <input type="file" id="exam-file" accept=".pdf,.docx" class="input-field" required>
                </div>
                <button type="submit" id="btn-submit" class="submit-btn">Kích Hoạt AI & Giao Bài Tập</button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = '[https://script.google.com/macros/s/AKfycbzHIBPyPZMSVjpOl9yt8LerjMvulbOe8xH-6YW3r9USnueCdh6iNnbWzcqOnCnyEKlEdw/exec](https://script.google.com/macros/s/AKfycbzHIBPyPZMSVjpOl9yt8LerjMvulbOe8xH-6YW3r9USnueCdh6iNnbWzcqOnCnyEKlEdw/exec)';

        window.addEventListener('DOMContentLoaded', () => {
            fetch(`${SCRIPT_URL}?action=init`)
                .then(res => res.json())
                .then(data => {
                    const classSelect = document.getElementById('exam-class');
                    classSelect.innerHTML = '<option value="" disabled selected>-- Chọn lớp nhận đề thi --</option>';
                    data.classes.forEach(c => {
                        const option = document.createElement('option');
                        option.value = c.id; option.innerText = c.name;
                        classSelect.appendChild(option);
                    });
                })
                .catch(() => alert("Lỗi kết nối đồng bộ danh mục lớp học!"));
        });

        function handleCreateExam(event) {
            event.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            const examTitle = document.getElementById('exam-title').value;
            const classId = document.getElementById('exam-class').value;
            const duration = document.getElementById('exam-duration').value;
            const fileInput = document.getElementById('exam-file');
            
            if (fileInput.files.length === 0) { alert("Vui lòng chọn file đề thi gốc!"); return; }
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Gemini AI đang đọc file và lập trình Canvas HTML...";

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            // Chuyển file thành chuỗi Base64 gửi lên hệ thống ngầm xử lý
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                const payload = {
                    action: "createExam",
                    examTitle: examTitle,
                    classId: classId,
                    duration: duration,
                    fileName: file.name,
                    fileMimeType: file.type,
                    fileData: base64Data
                };

                fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        alert(`[THÀNH CÔNG] Đề thi số hiệu ${res.examId} đã được AI sinh mã HTML hoàn tất và lưu trực tiếp lên Google Drive của bạn!\nDữ liệu cũng đã cập nhật tự động vào tab Exams.`);
                        document.getElementById('form-create-exam').reset();
                    } else { alert("Lỗi xử lý từ hệ thống: " + res.message); }
                })
                .catch(() => alert("Đường truyền kết nối server gặp sự cố!"))
                .finally(() => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "Kích Hoạt AI & Giao Bài Tập";
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
