<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển Giáo viên | Ms Thao English</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans min-h-screen p-4 md:p-8" style="background: linear-gradient(180deg, #FFFFFF 0%, #E8F5E9 100%);">

    <div class="w-full max-w-2xl mx-auto">
        <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-green-700 flex justify-between items-center mb-6">
            <div>
                <h2 class="text-lg font-extrabold text-green-900">Giao diện Giáo viên: Ms Thao English</h2>
                <p class="text-xs text-gray-500 font-medium">Hệ thống đồng bộ dữ liệu Real-time</p>
            </div>
            <button onclick="location.href='index.html'" class="bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-200 px-4 py-2 text-xs font-bold rounded-xl transition-all">
                Đăng xuất
            </button>
        </div>

        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-md border border-gray-100">
            <h3 class="text-xl font-extrabold text-green-900 text-center mb-6">Hệ Thống Tạo Đề Thi Với Gemini AI</h3>
            
            <form id="form-create-exam" onsubmit="handleCreateExam(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Tên bài kiểm tra / Tên đề thi</label>
                    <input type="text" id="exam-title" placeholder="Ví dụ: Đề kiểm tra từ vựng Tuần 1" required 
                           class="w-full px-4 py-3 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-800 outline-none focus:border-green-500 focus:ring-4 focus:ring-green-500/10 transition-all">
                </div>

                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Giao cho lớp học nào</label>
                    <div class="relative">
                        <select id="exam-class" required 
                                class="w-full px-4 py-3 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-800 outline-none appearance-none cursor-pointer focus:border-green-500 focus:ring-4 focus:ring-green-500/10 transition-all">
                            <option value="" disabled selected>Đang tải danh sách lớp từ hệ thống...</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-green-700">
                            <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Thời gian làm bài (Số phút)</label>
                    <input type="number" id="exam-duration" placeholder="Ví dụ: 15, 45, 60" min="1" required 
                           class="w-full px-4 py-3 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-800 outline-none focus:border-green-500 focus:ring-4 focus:ring-green-500/10 transition-all">
                </div>

                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Số lượng câu hỏi muốn lấy từ file</label>
                    <input type="number" id="exam-count" placeholder="Ví dụ: 10, 20, 42 (Để trống nếu muốn lấy hết)" min="1" 
                           class="w-full px-4 py-3 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-800 outline-none focus:border-green-500 focus:ring-4 focus:ring-green-500/10 transition-all">
                </div>

                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Tải file tài liệu chứa câu hỏi (PDF / DOCX)</label>
                    <input type="file" id="exam-file" accept=".pdf,.docx" required 
                           class="w-full px-4 py-2.5 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-500 outline-none file:mr-4 file:py-1.5 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer">
                </div>

                <button type="submit" id="btn-submit" 
                        class="w-full py-4 text-sm font-extrabold text-white bg-green-700 hover:bg-green-800 border-0 rounded-xl shadow-lg shadow-green-700/20 transition-all duration-300 transform active:scale-[0.99]">
                    Kích Hoạt AI & Giao Bài Tập
                </button>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzHIBPyPZMSVjpOl9yt8LerjMvulbOe8xH-6YW3r9USnueCdh6iNnbWzcqOnCnyEKlEdw/exec';

        window.addEventListener('DOMContentLoaded', () => {
            fetch(`${SCRIPT_URL}?action=init`)
                .then(res => res.json())
                .then(data => {
                    const classSelect = document.getElementById('exam-class');
                    classSelect.innerHTML = '<option value="" disabled selected>-- Chọn lớp nhận đề thi --</option>';
                    data.classes.forEach(c => {
                        const option = document.createElement('option');
                        option.value = c.id; option.innerText = c.name;
                        classSelect.appendChild(option);
                    });
                })
                .catch((err) => {
                    console.error(err);
                    alert("Lỗi kết nối đồng bộ danh mục lớp học!");
                });
        });

        function handleCreateExam(event) {
            event.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            const examTitle = document.getElementById('exam-title').value;
            const classId = document.getElementById('exam-class').value;
            const duration = document.getElementById('exam-duration').value;
            const questionCount = document.getElementById('exam-count').value || "tất cả"; // Bốc giá trị số câu hỏi
            const fileInput = document.getElementById('exam-file');
            
            if (fileInput.files.length === 0) { alert("Vui lòng chọn file đề thi gốc!"); return; }
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Gemini AI đang bóc tách đúng " + questionCount + " câu hỏi...";

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                const payload = {
                    action: "createExam",
                    examTitle: examTitle,
                    classId: classId,
                    duration: duration,
                    questionCount: questionCount, // Nạp vào gói gửi lên Server
                    fileName: file.name,
                    fileMimeType: file.type,
                    fileData: base64Data
                };

                fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(res => {
                    if (res.success) {
                        alert(`[THÀNH CÔNG] Đã lọc lấy đúng số lượng câu hỏi yêu cầu!\nĐề thi số hiệu ${res.examId} đã lưu vào folder riêng MTE_Canvas_Exams trên Drive.`);
                        document.getElementById('form-create-exam').reset();
                    } else { alert("Lỗi xử lý từ hệ thống: " + res.message); }
                })
                .catch(() => alert("Đường truyền kết nối server gặp sự cố!"))
                .finally(() => {
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "Kích Hoạt AI & Giao Bài Tập";
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
