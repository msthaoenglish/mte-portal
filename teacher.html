<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng điều khiển Giáo viên | Ms Thao English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } } }
    </script>
</head>
<body class="font-sans min-h-screen p-4 md:p-8" style="background: linear-gradient(180deg, #FFFFFF 0%, #E8F5E9 100%);">

    <div class="w-full max-w-2xl mx-auto">
        <div class="bg-white rounded-2xl p-5 shadow-sm border-l-4 border-green-700 flex justify-between items-center mb-6">
            <div>
                <h2 class="text-lg font-extrabold text-green-900">Giao diện Giáo viên: Ms Thao 👩‍🏫</h2>
                <p class="text-xs text-gray-500 font-medium">Cổng đồng bộ đề thi Canvas trực tiếp vào Sheet</p>
            </div>
            <button onclick="location.href='index.html'" class="bg-gray-100 hover:bg-gray-200 text-gray-600 border border-gray-200 px-4 py-2 text-xs font-bold rounded-xl transition-all">Đăng xuất</button>
        </div>

        <div class="bg-white rounded-3xl p-6 md:p-8 shadow-md border border-gray-100">
            <h3 class="text-xl font-extrabold text-green-900 text-center mb-6">ĐĂNG KÝ ĐỀ THI LÊN HỆ THỐNG</h3>
            
            <form id="form-create-exam" onsubmit="handleCreateExam(event)" class="space-y-5">
                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Tên bài kiểm tra / Tên đề thi hiển thị</label>
                    <input type="text" id="exam-title" placeholder="Ví dụ: Global Success 6 - Unit 3: Test 01" required 
                           class="w-full px-4 py-3 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-800 outline-none focus:border-green-500 transition-all">
                </div>

                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Giao cho lớp học nào</label>
                    <select id="exam-class" required class="w-full px-4 py-3 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-800 outline-none cursor-pointer">
                        <option value="" disabled selected>Đang tải danh sách lớp từ hệ thống...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Thời gian làm bài (Số phút)</label>
                    <input type="number" id="exam-duration" placeholder="Ví dụ: 45" min="1" required class="w-full px-4 py-3 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-800 outline-none">
                </div>

                <div>
                    <label class="block text-xs font-extrabold text-green-800 uppercase tracking-wider mb-2">Đường link File hoặc Mã ID file HTML trên Google Drive</label>
                    <input type="text" id="exam-file-id" placeholder="Dán link chia sẻ file Drive hoặc chỉ điền mã ID file vào đây..." required 
                           class="w-full px-4 py-3 text-sm font-medium border-2 border-green-700 rounded-xl bg-white text-gray-800 outline-none focus:border-green-500 transition-all font-mono">
                    <p class="text-[11px] text-gray-400 mt-1 italic">*Lưu ý: Nhớ bật chế độ 'Bất kỳ ai có liên kết đều có thể xem' cho file HTML đó trên Drive nhé má!</p>
                </div>

                <button type="submit" id="btn-submit" class="w-full py-4 text-sm font-extrabold text-white bg-green-700 hover:bg-green-800 rounded-xl shadow-lg transition-all transform active:scale-[0.99] flex items-center justify-center space-x-2">
                    <span>ĐỒNG BỘ ĐỀ THI LÊN SHEET TỔNG</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // 🌟 MÁ ĐIỀN ĐƯỜNG LINK WEB APP SCRIPT ĐUÔI /exec CỦA MÁ VÀO ĐÂY:
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzYcftoVEumIS0lGPmg1Enw7QOPU0puDib-b1eocj5j-DsYD5mHcKzIqiZXnrNc4oN7A/exec';

        // Tự động tải danh sách lớp từ tab Classes lên form khi vừa mở trang
        window.addEventListener('DOMContentLoaded', () => {
            fetch(`${SCRIPT_URL}?action=init`)
                .then(res => res.json())
                .then(data => {
                    const classSelect = document.getElementById('exam-class');
                    classSelect.innerHTML = '<option value="" disabled selected>-- Chọn lớp nhận bài thi này --</option>';
                    data.classes.forEach(c => {
                        const option = document.createElement('option'); option.value = c.id; option.innerText = c.name;
                        classSelect.appendChild(option);
                    });
                }).catch(() => alert("Lỗi kết nối đồng bộ danh sách lớp!"));
        });

        // Xử lý gửi dữ liệu khi má bấm nút nộp form
        function handleCreateExam(event) {
            event.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Đang đồng bộ dữ liệu về file Sheet...";

            const payload = {
                action: "createExam",
                examTitle: document.getElementById('exam-title').value,
                classId: document.getElementById('exam-class').value,
                duration: document.getElementById('exam-duration').value,
                driveFileId: document.getElementById('exam-file-id').value
            };

            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(res => {
                if (res.success) {
                    alert(`[THÀNH CÔNG RỰC RỠ] Đề thi đã được ghi nhận tự động vào dòng cuối cùng của tab Exams với Mã Đề: ${res.examId}! Học sinh đã có thể vào phòng thi.`);
                    document.getElementById('form-create-exam').reset();
                } else { alert("Có lỗi xảy ra từ máy chủ Google!"); }
            })
            .catch(() => alert("Lỗi đường truyền Internet!"))
            .finally(() => {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "ĐỒNG BỘ ĐỀ THI LÊN SHEET TỔNG";
            });
        }
    </script>
</body>
</html>
