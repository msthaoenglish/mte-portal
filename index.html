<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Ms Thao English Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(180deg, #FFFFFF 0%, #E8F5E9 100%); padding: 20px; }
        .login-card { background-color: #FFFFFF; width: 100%; max-width: 440px; border-radius: 20px; padding: 40px 25px; box-shadow: 0 10px 30px rgba(27, 94, 32, 0.05); text-align: center; }
        .title { font-size: 26px; font-weight: 800; color: #1b5e20; margin-bottom: 6px; letter-spacing: -0.5px; }
        .subtitle { font-size: 13px; color: #666666; margin-bottom: 25px; font-weight: 500; }
        .tab-container { display: flex; background-color: #F5F5F5; border-radius: 12px; padding: 4px; margin-bottom: 25px; border: 1px solid #E0E0E0; gap: 2px; }
        .tab { flex: 1; padding: 10px 0; font-size: 13px; font-weight: 700; color: #757575; cursor: pointer; border-radius: 9px; transition: all 0.2s ease; white-space: nowrap; }
        .tab.active { background-color: #C8E6C9; color: #1b5e20; }
        .error-box { display: none; background-color: #FFEBEE; border: 1px solid #FFCDD2; color: #C62828; font-size: 13px; padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-weight: 600; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .label { display: block; font-size: 11px; font-weight: 800; color: #2E7D32; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
        .input-field, .select-field { width: 100%; padding: 13px 15px; font-size: 14px; font-weight: 500; border: 1.5px solid #2E7D32; border-radius: 12px; color: #333333; background-color: #FFFFFF; outline: none; transition: all 0.3s; }
        .hidden { display: none; }
        .select-field { appearance: none; -webkit-appearance: none; -moz-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232E7D32' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 16px; cursor: pointer; }
        .select-field:disabled { background-color: #F5F5F5; border-color: #BDBDBD; color: #9E9E9E; cursor: not-allowed; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239E9E9E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); }
        .input-field::placeholder { color: #9E9E9E; }
        .input-field:focus, .select-field:focus { border-color: #4CAF50; box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15); }
        .submit-btn { width: 100%; padding: 15px; font-size: 15px; font-weight: 700; color: #FFFFFF; background-color: #4CAF50; border: none; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2); margin-top: 10px; }
        .submit-btn:hover { background-color: #388E3C; }
        .hint-text { font-size: 11px; color: #666666; margin-top: 6px; display: block; font-style: italic; }
        .footer-text { font-size: 11px; color: #999999; margin-top: 30px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="title">Ms Thao English</h1>
        <p class="subtitle">Cổng Thông Tin Học Tập Trực Tuyến</p>
        <div class="tab-container">
            <div id="tab-student" class="tab active" onclick="switchRole('student')">Học sinh</div>
            <div id="tab-ta" class="tab" onclick="switchRole('ta')">Trợ giảng</div>
            <div id="tab-teacher" class="tab" onclick="switchRole('teacher')">Giáo viên</div>
            <div id="tab-admin" class="tab" onclick="switchRole('admin')">Quản trị</div>
        </div>
        <div id="error-box" class="error-box"></div>
        
        <form id="form-student" onsubmit="handleLogin(event, 'student')">
            <div class="form-group">
                <label class="label">Bước 1: Chọn lớp của con</label>
                <select id="student-class" class="select-field" onchange="loadStudentNames()" required>
                    <option value="" disabled selected>Đang kết nối cơ sở dữ liệu...</option>
                </select>
            </div>
            <div class="form-group">
                <label class="label">Bước 2: Chọn họ và tên của con</label>
                <select id="student-name" class="select-field" disabled required>
                    <option value="" disabled selected>-- Vui lòng chọn lớp trước --</option>
                </select>
            </div>
            <div class="form-group">
                <label class="label">Bước 3: Nhập mật khẩu (Mã PIN)</label>
                <input type="password" id="student-pin" class="input-field" placeholder="Nhập mật khẩu" required>
                <span class="hint-text">* Mật khẩu xem trên cột Password của lớp</span>
            </div>
            <button type="submit" class="submit-btn">Vào Làm Bài Tập</button>
        </form>

        <form id="form-staff" class="hidden" onsubmit="handleLogin(event, 'staff')">
            <div class="form-group">
                <label id="label-username" class="label">Tài khoản quản lý</label>
                <input type="text" id="staff-user" placeholder="Nhập tên tài khoản" required class="input-field">
            </div>
            <div class="form-group">
                <label class="label">Mật khẩu hệ thống</label>
                <input type="password" id="staff-pass" placeholder="Nhập mật khẩu bảo mật" required class="input-field">
            </div>
            <button type="submit" class="submit-btn">Xác Minh Hệ Thống</button>
        </form>
        <p class="footer-text">© 2026 Ms Thao English Portal. Bảo lưu mọi quyền.</p>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzHIBPyPZMSVjpOl9yt8LerjMvulbOe8xH-6YW3r9USnueCdh6iNnbWzcqOnCnyEKlEdw/exec';
        let sheetData = { classes: [], students: {} };
        let currentRole = 'student';

        window.addEventListener('DOMContentLoaded', () => {
            fetch(`${SCRIPT_URL}?action=init`)
                .then(res => res.json())
                .then(data => {
                    sheetData = data;
                    const classSelect = document.getElementById('student-class');
                    classSelect.innerHTML = '<option value="" disabled selected>-- Bấm vào đây để chọn lớp --</option>';
                    sheetData.classes.forEach(c => {
                        const option = document.createElement('option');
                        option.value = c.id; option.innerText = c.name;
                        classSelect.appendChild(option);
                    });
                })
                .catch(() => showError("Không thể kết nối tới Google Sheet!"));
        });

        function switchRole(role) {
            currentRole = role;
            document.getElementById('error-box').style.display = 'none';
            ['student', 'ta', 'teacher', 'admin'].forEach(r => document.getElementById(`tab-${r}`).classList.remove('active'));
            document.getElementById(`tab-${role}`).classList.add('active');

            if (role === 'student') {
                document.getElementById('form-student').classList.remove('hidden');
                document.getElementById('form-staff').classList.add('hidden');
            } else {
                document.getElementById('form-student').classList.add('hidden');
                document.getElementById('form-staff').classList.remove('hidden');
                const labelUser = document.getElementById('label-username');
                if (role === 'ta') labelUser.innerText = "Tài khoản Trợ giảng (TA)";
                else if (role === 'teacher') labelUser.innerText = "Tài khoản Giáo viên";
                else labelUser.innerText = "Tài khoản Quản trị";
            }
        }

        function loadStudentNames() {
            const classId = document.getElementById('student-class').value;
            const nameSelect = document.getElementById('student-name');
            nameSelect.innerHTML = '<option value="" disabled selected>-- Bấm vào đây để chọn tên con --</option>';
            if (classId && sheetData.students[classId]) {
                nameSelect.disabled = false;
                sheetData.students[classId].forEach(name => {
                    const option = document.createElement('option');
                    option.value = name; option.innerText = name;
                    nameSelect.appendChild(option);
                });
            } else { nameSelect.disabled = true; }
        }

        function handleLogin(event, type) {
            event.preventDefault();
            document.getElementById('error-box').style.display = 'none';

            if (type === 'student') {
                const classId = document.getElementById('student-class').value;
                const studentName = document.getElementById('student-name').value;
                const pin = document.getElementById('student-pin').value;
                fetch(`${SCRIPT_URL}?action=login&classId=${classId}&studentName=${encodeURIComponent(studentName)}&password=${encodeURIComponent(pin)}`)
                    .then(res => res.json())
                    .then(res => {
                        if (res.success) {
                            const className = document.getElementById('student-class').options[document.getElementById('student-class').selectedIndex].text;
                            window.location.href = `dashboard.html?classId=${classId}&name=${encodeURIComponent(studentName)}&className=${encodeURIComponent(className)}`;
                        } else { showError(res.message); }
                    })
                    .catch(() => showError("Lỗi kết nối xác thực dữ liệu!"));
            } else {
                const user = document.getElementById('staff-user').value;
                const pass = document.getElementById('staff-pass').value;
                fetch(`${SCRIPT_URL}?action=staffLogin&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&role=${currentRole}`)
                    .then(res => res.json())
                    .then(res => {
                        if (res.success) {
                            if (currentRole === 'teacher') {
                                alert(`Chào mừng Giáo viên: ${res.fullName}`);
                                window.location.href = 'teacher.html';
                            } else if (currentRole === 'ta') {
                                alert(`Chào mừng Trợ giảng: ${res.fullName}`);
                                window.location.href = 'teacher.html'; // Tạm thời dẫn chung vào đây
                            } else {
                                alert(`Chào mừng Quản trị viên: ${res.fullName}`);
                            }
                        } else { showError(res.message); }
                    })
                    .catch(() => showError("Lỗi kết nối máy chủ quản lý!"));
            }
        }
        function showError(msg) { const box = document.getElementById('error-box'); box.innerText = msg; box.style.display = 'block'; }
    </script>
</body>
</html>
