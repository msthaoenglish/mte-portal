<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Ms Thao English Portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Reset CSS cơ bản và áp dụng Font chữ mới */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Nền Gradient nhẹ nhàng trắng - xanh bạc hà */
            background: linear-gradient(180deg, #FFFFFF 0%, #E8F5E9 100%);
            padding: 20px;
        }

        /* Khung bo bên ngoài (Card) */
        .login-card {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 420px;
            border-radius: 20px; /* Bo góc mềm mại hơn */
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(27, 94, 32, 0.05); /* Đổ bóng ánh xanh nhẹ */
            text-align: center;
        }

        /* Tên Trung Tâm */
        .title {
            font-size: 26px;
            font-weight: 800;
            color: #1b5e20; 
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: #666666;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Thanh chuyển đổi đối tượng (Học sinh / Giáo viên / Quản trị) */
        .tab-container {
            display: flex;
            background-color: #F5F5F5;
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 25px;
            border: 1px solid #E0E0E0;
        }

        .tab {
            flex: 1;
            padding: 11px 0;
            font-size: 14px;
            font-weight: 700; /* Đậm nét font mới */
            color: #757575;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.3s ease;
        }

        /* Trạng thái Tab đang được chọn */
        .tab.active {
            background-color: #C8E6C9; 
            color: #1b5e20; 
        }

        /* Hộp hiển thị thông báo lỗi */
        .error-box {
            display: none;
            background-color: #FFEBEE;
            border: 1px solid #FFCDD2;
            color: #C62828;
            font-size: 13px;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: left;
            font-weight: 600;
        }

        /* Cấu trúc các ô nhập liệu */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .label {
            display: block;
            font-size: 11px;
            font-weight: 800; /* Tăng độ đậm tiêu đề trường */
            color: #2E7D32; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 7px;
        }

        /* Định dạng chung cho Ô nhập văn bản và Ô chọn thả xuống */
        .input-field, .select-field {
            width: 100%;
            padding: 13px 15px;
            font-size: 14px;
            font-weight: 500;
            border: 1.5px solid #2E7D32; 
            border-radius: 12px;
            color: #333333;
            background-color: #FFFFFF;
            outline: none;
            transition: all 0.3s;
        }

        .hidden {
            display: none;
        }

        /* Thiết kế mũi tên tùy chỉnh cho ô Select */
        .select-field {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232E7D32' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            cursor: pointer;
        }

        .select-field:disabled {
            background-color: #F5F5F5;
            border-color: #BDBDBD;
            color: #9E9E9E;
            cursor: not-allowed;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239E9E9E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        }

        .input-field::placeholder {
            color: #9E9E9E;
        }

        .input-field:focus, .select-field:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.15);
        }

        /* Nút Đăng nhập / Vào cổng */
        .submit-btn {
            width: 100%;
            padding: 15px;
            font-size: 15px;
            font-weight: 700;
            color: #FFFFFF;
            background-color: #4CAF50; 
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #388E3C;
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: scale(0.99);
        }

        /* Gợi ý nhỏ bên dưới */
        .hint-text {
            font-size: 11px;
            color: #666666;
            margin-top: 6px;
            display: block;
            font-style: italic;
        }

        /* Bản quyền ở chân trang */
        .footer-text {
            font-size: 11px;
            color: #999999;
            margin-top: 30px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="title">Ms Thao English</h1>
        <p class="subtitle">Cổng Thông Tin Học Tập Trực Tuyến</p>

        <div class="tab-container">
            <div id="tab-student" class="tab active" onclick="switchRole('student')">Học sinh</div>
            <div id="tab-teacher" class="tab" onclick="switchRole('teacher')">Giáo viên</div>
            <div id="tab-admin" class="tab" onclick="switchRole('admin')">Quản trị</div>
        </div>

        <div id="error-box" class="error-box"></div>

        <form id="form-student" onsubmit="handleLogin(event, 'student')">
            <div class="form-group">
                <label class="label">Bước 1: Chọn lớp của con</label>
                <select id="student-class" class="select-field" onchange="loadStudentNames()" required>
                    <option value="" disabled selected>-- Bấm vào đây để chọn lớp --</option>
                    <option value="C001">HAPPY</
